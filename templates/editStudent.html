{% extends "adminBase.html" %}

{% block content %}

<div class="page-header">
    <h2>Edit Student</h2>
    <a href="{{ url_for('students') }}" class="btn btn-back">Back to Student Management</a>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="form-card">
    <form action="{{ url_for('edit_student', id=student.id) }}" method="POST" class="student-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ student.full_name }}" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Class</label>
            <input type="text" name="student_class" value="{{ student.student_class }}" placeholder="Enter class" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Admission Date</label>
            <input type="date" name="admission_date" value="{{ student.admission_date }}" required>
        </div>

        <button type="submit" class="btn btn-save">Save Changes</button>
    </form>
</div>

{% endblock %}
