<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Welcome, {{ admin }}</h2>
        <ul>
            <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('students') }}">Students</a></li>
            <li><a href="{{ url_for('teachers') }}">Teachers</a></li>
            <li><a href="{{ url_for('admin_admissions') }}">Admissions</a></li>
            <li><a href="{{ url_for('gallery_admin') }}">Gallery</a></li>
            <li><a href="{{ url_for('messages') }}">Announcements</a></li>
            <li><a href="{{ url_for('inquiries') }}">Contact Inquiries</a></li>
            <li><a href="{{ url_for('admin_principal') }}">Principal Message</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

</div>

</body>
</html>
