{% extends "adminBase.html" %}

{% block content %}

<div class="form-container">
    <div class="form-card">
        <h2>Edit Teacher</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="full_name" value="{{ teacher.full_name }}" required>
            </div>

            <div class="form-group">
                <label>Gender *</label>
                <select name="gender" required>
                    <option value="Male" {% if teacher.gender == "Male" %}selected{% endif %}>Male</option>
                    <option value="Female" {% if teacher.gender == "Female" %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Subjects *</label>
                <input type="text" name="subjects" value="{{ teacher.subjects }}" required>
            </div>

            <div class="form-group">
                <label>Classes Assigned</label>
                <input type="text" name="classes_assigned" value="{{ teacher.classes_assigned }}">
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ teacher.dob }}">
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" name="contact_number" value="{{ teacher.contact_number }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ teacher.email }}">
            </div>

            <div class="form-group">
                <label>Hire Date</label>
                <input type="date" name="hire_date" value="{{ teacher.hire_date }}">
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" step="0.01" name="salary" value="{{ teacher.salary }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Update Teacher</button>
                <a href="{{ url_for('teachers') }}" class="btn-secondary">Cancel</a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
